    <meta name="apple-mobile-web-app-title" content="AFA Media" />
    <link rel="manifest" href="/site.webmanifest?v=3" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <title>AFA Media | AI Booking Systems & Professional Websites</title>
    <meta name="description" content="AFA Media builds high-conversion websites and AI booking systems for UK businesses. Stop missing leads and automate your appointments 24/7." />
    <link rel="canonical" href="https://www.afamedia.co.uk/" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AFA Media",
        "url": "https://www.afamedia.co.uk",
        "logo": "https://ik.imagekit.io/hxkb52bem/afa%20media%20logo%20no%20BG.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+44 7516 294378",
          "contactType": "customer service",
          "areaServed": "GB",
          "availableLanguage": "en"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <!-- Voiceflow Chatbot Integration (Updated) -->
    <script type="text/javascript">
      window.addEventListener('load', function() {
        setTimeout(function() {
          (function(d, t) {
              var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
              v.onload = function() {
                window.voiceflow.chat.load({
                  verify: { projectID: '6910925e6076dd72b3b0c250' },
                  url: 'https://general-runtime.voiceflow.com',
                  versionID: 'production',
                  voice: {
                    url: "https://runtime-api.voiceflow.com"
                  }
                });
              }
              v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
          })(document, 'script');
        }, 1500); // Delay Voiceflow to prioritize main UI rendering
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background-color: #ffffff; z-index: 99999;">
        <img src="https://i.postimg.cc/dtSywjrn/afa-media-logo1-remove.png" alt="AFA Media Logo" style="width: 120px; height: auto; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;" />
      </div>
    </div>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
